services:
  postgres:
    image: postgres:16-alpine
    container_name: billing-trial-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trial
      POSTGRES_PASSWORD: trial
      POSTGRES_DB: billing_trial
    ports:
      - "5433:5432"
    volumes:
      - billing-trial-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trial -d billing_trial"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  billing-trial-pgdata:
